name: Update station data

on:
  schedule:
    # First Monday of each month at 06:00 UTC
    - cron: "0 6 1-7 * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest station data
        run: bash scripts/fetch-stations.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/stations.json; then
            echo "No changes detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            OLD=$(git show HEAD:src/data/stations.json | wc -l)
            NEW=$(wc -l < src/data/stations.json)
            # Subtract 2 for the [ and ] lines
            OLD_COUNT=$((OLD - 2))
            NEW_COUNT=$((NEW - 2))
            DIFF=$((NEW_COUNT - OLD_COUNT))
            if [ "$DIFF" -ge 0 ]; then SIGN="+"; else SIGN=""; fi
            echo "summary=${SIGN}${DIFF} stations (${OLD_COUNT} → ${NEW_COUNT})" >> "$GITHUB_OUTPUT"
            echo "${SIGN}${DIFF} stations (${OLD_COUNT} → ${NEW_COUNT})"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/update-stations
          delete-branch: true
          commit-message: "Update station data from SBB Didok"
          title: "Update station data (${{ steps.diff.outputs.summary }})"
          body: |
            Automated update of `src/data/stations.json` from the [SBB Didok dataset](https://data.sbb.ch/explore/dataset/dienststellen-gemass-opentransportdataswiss).

            **Change: ${{ steps.diff.outputs.summary }}**
